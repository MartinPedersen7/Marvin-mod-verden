<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />

  <meta name="theme-color" content="#061a35" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Marvin mod verden" />

  <link rel="manifest" href="manifest.json?v=touchfix2" />
  <link rel="apple-touch-icon" href="assets/icon-192.png?v=touchfix2" />
  <link rel="stylesheet" href="style.css?v=touchfix2" />

  <title>Marvin mod verden</title>
</head>

<body>
  <div id="game-shell">
    <div id="game-container"></div>
  </div>

  <script>
    function setRealViewportHeight() {
      const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty("--app-height", `${height}px`);
    }

    setRealViewportHeight();
    window.addEventListener("resize", setRealViewportHeight);
    window.addEventListener("orientationchange", function () {
      setTimeout(setRealViewportHeight, 250);
    });
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setRealViewportHeight);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="game.js?v=touchfix2"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js?v=touchfix2").then(function (registration) {
          registration.update();
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
