<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />

  <meta name="theme-color" content="#061a35" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Marvin mod verden" />

  <link rel="manifest" href="manifest.json?v=iphone17-fix-3" />
  <link rel="apple-touch-icon" href="assets/icon-192.png?v=iphone17-fix-3" />
  <link rel="stylesheet" href="style.css?v=iphone17-fix-3" />

  <title>Marvin mod verden</title>
</head>

<body>
  <div id="game-shell">
    <div id="game-container"></div>
  </div>

  <script>
    async function removeOldCacheAndServiceWorkers() {
      try {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (const registration of registrations) {
            await registration.unregister();
          }
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          for (const key of keys) {
            await caches.delete(key);
          }
        }
      } catch (error) {
        // Spillet virker stadig uden cache-reset.
      }
    }

    function setRealViewportHeight() {
      const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty("--app-height", `${height}px`);
    }

    setRealViewportHeight();

    window.addEventListener("resize", setRealViewportHeight);
    window.addEventListener("orientationchange", function () {
      setTimeout(setRealViewportHeight, 250);
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", setRealViewportHeight);
      window.visualViewport.addEventListener("scroll", setRealViewportHeight);
    }

    removeOldCacheAndServiceWorkers();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="game.js?v=iphone17-fix-3"></script>
</body>
</html>
